apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-cs-deployment
  namespace: my-cs
spec:
  revisionHistoryLimit: 0
  replicas: 4
  selector:
    matchLabels:
      app: my-cs
  template:
    metadata:
      labels:
        app: my-cs
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: my-cs-frontend
          image: netsim.cs.uowm.gr/ieee-lab/my.cs.uowm:latest
          ports:
            - containerPort: 80
